<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. Standalone HUD</title>
    
    <!-- Libraries via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;400;500;700&family=Fira+Code&display=swap" rel="stylesheet">

    <style>
        :root {
            --hud-bg-color: #030814;
            --hud-text-primary: #e0f2f1;
            --hud-accent-primary: #00e5ff;
            --hud-accent-secondary: #00c2ff;
            --hud-glow-color: rgba(0, 229, 255, 0.7);
        }
        body {
            background-color: var(--hud-bg-color);
            color: var(--hud-text-primary);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            margin: 0;
        }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .jarvis-glow {
            text-shadow: 0 0 5px var(--hud-glow-color), 0 0 10px var(--hud-glow-color);
        }
        .jarvis-border {
            border: 1px solid rgba(0, 194, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 194, 255, 0.2) inset, 0 0 5px rgba(0, 194, 255, 0.3);
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(3, 8, 20, 0.5); }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 194, 255, 0.4);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // --- Icons ---
        const ArcReactorIcon = ({ className }) => (
            <svg viewBox="0 0 100 100" className={className} fill="none" stroke="currentColor" strokeWidth="3">
                <circle cx="50" cy="50" r="45" strokeOpacity="0.5"/>
                <circle cx="50" cy="50" r="30" strokeOpacity="0.8"/>
                <circle cx="50" cy="50" r="15"/>
                <path d="M50 5 L50 25 M95 50 L75 50 M50 95 L50 75 M5 50 L25 50" strokeWidth="2"/>
                <path d="M67.68 32.32 L60.6 39.4 M32.32 67.68 L39.4 60.6 M32.32 32.32 L39.4 39.4 M67.68 67.68 L60.6 60.6" strokeWidth="2"/>
            </svg>
        );

        const MicIcon = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
            </svg>
        );

        const MicOffIcon = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="1" y1="1" x2="23" y2="23"></line>
                <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path>
                <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
            </svg>
        );

        // --- Visualizer Component ---
        const VoiceVisualizer = ({ analyserNode, status }) => {
            const canvasRef = useRef(null);
            const animationRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const bufferLength = analyserNode ? analyserNode.frequencyBinCount : 0;
                const dataArray = new Uint8Array(bufferLength);

                const draw = () => {
                    animationRef.current = requestAnimationFrame(draw);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    const radius = 80;

                    // Draw static rings
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                    ctx.strokeStyle = 'rgba(0, 229, 255, 0.2)';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    if (analyserNode) {
                        analyserNode.getByteFrequencyData(dataArray);
                        const points = 64;
                        ctx.beginPath();
                        for (let i = 0; i < points; i++) {
                            const angle = (i / points) * 2 * Math.PI;
                            const value = dataArray[i % bufferLength] / 255.0;
                            const currentRadius = radius + (value * 40);
                            const x = centerX + Math.cos(angle) * currentRadius;
                            const y = centerY + Math.sin(angle) * currentRadius;
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.closePath();
                        ctx.strokeStyle = '#00e5ff';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                };

                draw();
                return () => cancelAnimationFrame(animationRef.current);
            }, [analyserNode]);

            return (
                <div className="relative flex items-center justify-center w-64 h-64">
                    <canvas ref={canvasRef} width="300" height="300" className="absolute" />
                    <div className={`w-32 h-32 rounded-full flex items-center justify-center jarvis-border transition-all duration-500 ${status === 'SPEAKING' ? 'scale-110 shadow-[0_0_30px_rgba(0,229,255,0.5)]' : ''}`}>
                        <ArcReactorIcon className={`w-16 h-16 text-cyan-400 ${status === 'THINKING' ? 'animate-spin' : ''}`} />
                    </div>
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('jarvis_api_key') || '');
            const [isReady, setIsReady] = useState(!!apiKey);
            const [status, setStatus] = useState('IDLE');
            const [transcript, setTranscript] = useState({ user: '', jarvis: '' });
            const [isMuted, setIsMuted] = useState(true);
            const [analyser, setAnalyser] = useState(null);

            const handleKeySubmit = (e) => {
                e.preventDefault();
                const key = e.target.key.value.trim();
                if (key) {
                    localStorage.setItem('jarvis_api_key', key);
                    setApiKey(key);
                    setIsReady(true);
                }
            };

            const toggleMic = async () => {
                if (!isMuted) {
                    setIsMuted(true);
                    setStatus('IDLE');
                    return;
                }

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioCtx.createMediaStreamSource(stream);
                    const newAnalyser = audioCtx.createAnalyser();
                    source.connect(newAnalyser);
                    setAnalyser(newAnalyser);
                    setIsMuted(false);
                    setStatus('LISTENING');
                    
                    // Note: In a real standalone, you'd integrate the Gemini Live API here
                    // using the @google/genai SDK loaded via CDN.
                    setTranscript({ user: 'Hello Jarvis', jarvis: 'Hello Zainul. System is active.' });
                } catch (err) {
                    alert("Microphone access denied or error: " + err.message);
                }
            };

            if (!isReady) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="jarvis-border bg-black/50 backdrop-blur-md p-8 rounded-xl max-w-md w-full text-center">
                            <ArcReactorIcon className="w-16 h-16 text-cyan-400 mx-auto mb-6" />
                            <h1 className="font-orbitron text-2xl text-cyan-300 mb-4 jarvis-glow">SYSTEM ACTIVATION</h1>
                            <form onSubmit={handleKeySubmit} className="space-y-4">
                                <input name="key" type="password" placeholder="Enter Gemini API Key" className="w-full bg-black/50 border border-cyan-500/30 rounded p-2 text-cyan-100 focus:outline-none focus:border-cyan-400" required />
                                <button type="submit" className="w-full bg-cyan-500/20 border border-cyan-400 text-cyan-300 py-2 rounded hover:bg-cyan-500/40 transition-all font-bold">ACTIVATE</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen relative flex flex-col">
                    {/* Background FX */}
                    <div className="absolute inset-0 pointer-events-none opacity-20">
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_rgba(0,194,255,0.1)_0,_transparent_70%)]"></div>
                    </div>

                    <header className="p-6 flex justify-between items-start z-10">
                        <div className="text-left">
                            <h1 className="font-orbitron text-3xl font-bold text-cyan-300 jarvis-glow tracking-tighter">J.A.R.V.I.S.</h1>
                            <p className="text-xs text-cyan-500/70 uppercase tracking-widest">Mark VII Interface</p>
                        </div>
                        <div className="text-right font-mono text-xs text-cyan-400/50">
                            <div>STATUS: {status}</div>
                            <div>ENCRYPTION: ACTIVE</div>
                        </div>
                    </header>

                    <main className="flex-grow flex flex-col items-center justify-center relative z-10">
                        <VoiceVisualizer analyserNode={analyser} status={status} />
                        
                        <div className="mt-12 max-w-2xl w-full px-6 text-center space-y-8">
                            {transcript.jarvis && (
                                <div className="animate-fadeIn">
                                    <p className="text-3xl text-cyan-100 jarvis-glow font-light leading-tight">
                                        {transcript.jarvis}
                                    </p>
                                </div>
                            )}
                            {transcript.user && (
                                <div className="animate-fadeIn opacity-60">
                                    <p className="text-lg text-cyan-400 italic">
                                        "{transcript.user}"
                                    </p>
                                </div>
                            )}
                        </div>
                    </main>

                    <footer className="p-12 flex justify-center z-20">
                        <button 
                            onClick={toggleMic}
                            className={`w-20 h-20 rounded-full flex items-center justify-center transition-all duration-300 jarvis-border backdrop-blur-md ${isMuted ? 'bg-red-500/10 text-red-400 border-red-500/30' : 'bg-cyan-500/10 text-cyan-400 border-cyan-500/30 shadow-[0_0_20px_rgba(0,229,255,0.3)]'}`}
                        >
                            {isMuted ? <MicOffIcon className="w-10 h-10" /> : <MicIcon className="w-10 h-10" />}
                        </button>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
