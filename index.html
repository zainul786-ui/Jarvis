<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030814" />
    <link rel="manifest" href="/manifest.json" />
    <title>J.A.R.V.I.S. Web HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --hud-bg-color: #030814;
        --hud-text-primary: #e0f2f1;
        --hud-accent-primary: #00e5ff;
        --hud-accent-secondary: #00c2ff;
        --hud-glow-color: rgba(0, 229, 255, 0.7);
      }
      body {
        background-color: var(--hud-bg-color);
        color: var(--hud-text-primary);
        font-family: 'Rajdhani', sans-serif;
        overflow: hidden;
      }
      .font-orbitron {
        font-family: 'Orbitron', sans-serif;
      }
      .jarvis-glow {
        text-shadow: 0 0 5px var(--hud-glow-color), 0 0 10px var(--hud-glow-color), 0 0 15px var(--hud-glow-color);
      }
      .jarvis-border {
        border: 1px solid rgba(0, 194, 255, 0.3);
        box-shadow: 0 0 15px rgba(0, 194, 255, 0.2) inset, 0 0 5px rgba(0, 194, 255, 0.3);
      }
      .hud-line {
        background: linear-gradient(90deg, transparent, var(--hud-accent-primary), transparent);
      }
       /* Scrollbar Styles */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(3, 8, 20, 0.5);
      }
      ::-webkit-scrollbar-thumb {
        background-color: rgba(0, 194, 255, 0.4);
        border-radius: 10px;
        border: 2px solid rgba(3, 8, 20, 0.5);
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: rgba(0, 194, 255, 0.7);
      }
    </style>
